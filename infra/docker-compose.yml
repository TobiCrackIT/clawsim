version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: clawsim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clawsim
    ports:
      - "5432:5432"
    volumes:
      - clawsim-postgres-data:/var/lib/postgresql/data

volumes:
  clawsim-postgres-data:
